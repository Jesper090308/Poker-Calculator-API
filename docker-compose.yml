version: '3.8'

services:
  pokerbot:
    build: .
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      # Optional: for development, mount source code
      # - .:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import pyspiel; print('OK')"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
